name: Automated Code Review via PR
on:

  push:

    branches: [ "main" ]

  pull_request:

    branches: [ "main" ]

permissions:

  contents: read

  pull-requests: write

  checks: write



jobs:

  review-job:

    runs-on: ubuntu-latest



    steps:

      - name: Lay code tu Github

        uses: actions/checkout@v4



      - name: Cai dat JDK 11

        uses: actions/setup-java@v4

        with:

          java-version: '11'

          distribution: 'temurin'

          cache: maven


      - name: Run Checkstyle

        run: mvn clean checkstyle:checkstyle

        working-directory: ./bai07


      - name: Checkstyle Inline Feedback

        uses: dbelyaev/action-checkstyle@master

        if: failure() || success()

        with:

          github_token: ${{ secrets.GITHUB_TOKEN }}

          checkstyle_config: google_checks.xml

          level: warning

      - name: Final Verification

        run: mvn clean verify

        working-directory: ./bai07