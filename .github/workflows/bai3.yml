name: Cac bai ve CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-job:
    strategy:
      matrix:

        os: [ ubuntu-latest, windows-latest,macos-latest ]
    runs-on: ${{matrix.os}}

    steps:
      - name: Lay code tu Github
        uses: actions/checkout@v4

      - name: Cai dat JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: maven

#      - name: Chay Maven trong folder bai05
#        run: mvn clean package
#        working-directory: ./bai05

      - name: Chay JaCoCo trong folder bai05
        run: mvn clean verify
        working-directory: ./bai05

      - name: Luu file JAR sau khi build thành công
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: bai05/target/*.jar
