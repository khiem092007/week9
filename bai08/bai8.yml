name: Automated Code Review and Testing
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read
  pull-requests: write
  checks: write

jobs:
  review-and-test-job:
    name: "CI Check: Logic and Style"
    runs-on: ubuntu-latest

    steps:
      - name: Lay code tu Github
        uses: actions/checkout@v4

      - name: Cai dat JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: maven

      - name: Run Checkstyle
        id: checkstyle
        run: mvn clean checkstyle:checkstyle
        working-directory: ./bai07

      - name: Checkstyle Inline Feedback
        uses: dbelyaev/action-checkstyle@master
        if: always() # Chạy bước này kể cả khi Checkstyle fail để còn có comment mà chụp ảnh
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          checkstyle_config: google_checks.xml
          level: warning

      - name: Final Verification (Logic Test)
        run: mvn clean verify
        working-directory: ./bai07